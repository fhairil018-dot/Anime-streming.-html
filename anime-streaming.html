<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121c;
    --bg3: #1a1a2e;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #ffd60a;
    --text: #f1f1f1;
    --muted: #8888aa;
    --border: rgba(255,255,255,0.08);
    --card-hover: rgba(230,57,70,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 64px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 2px;
    cursor: pointer;
  }
  .logo span { color: var(--text); }

  .nav-links {
    display: flex; gap: 2rem; list-style: none;
  }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 0.9rem;
    font-weight: 500; transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  .nav-right { display: flex; align-items: center; gap: 1rem; }

  .search-bar {
    display: flex; align-items: center;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.45rem 1rem; gap: 0.5rem;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 0.85rem; width: 180px;
    font-family: 'DM Sans', sans-serif;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }

  .btn-login {
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-login:hover { background: var(--accent2); transform: translateY(-1px); }

  /* HERO */
  .hero {
    margin-top: 64px; position: relative; overflow: hidden;
    height: 540px; display: flex; align-items: flex-end;
  }

  .hero-slides { position: absolute; inset: 0; }
  .hero-slide {
    position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s;
  }
  .hero-slide.active { opacity: 1; }
  .hero-slide img {
    width: 100%; height: 100%; object-fit: cover; object-position: center top;
    filter: brightness(0.4);
  }
  .hero-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to right, rgba(10,10,15,0.95) 35%, transparent 70%),
                linear-gradient(to top, rgba(10,10,15,1) 10%, transparent 50%);
  }

  .hero-content {
    position: relative; z-index: 2; padding: 3rem 3rem;
    max-width: 520px;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--accent); color: #fff; padding: 0.3rem 0.8rem;
    border-radius: 4px; font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.5px; margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .hero-title {
    font-family: 'Bebas Neue', cursive; font-size: 3.5rem;
    line-height: 1; color: #fff; margin-bottom: 0.8rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .hero-meta {
    display: flex; align-items: center; gap: 1rem;
    font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem;
  }

  .hero-rating { color: var(--gold); font-weight: 600; }

  .hero-desc {
    font-size: 0.9rem; color: rgba(241,241,241,0.75);
    line-height: 1.7; margin-bottom: 1.5rem;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .hero-buttons { display: flex; gap: 1rem; }

  .btn-play {
    display: flex; align-items: center; gap: 0.6rem;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    padding: 0.75rem 1.8rem; border-radius: 8px;
    font-size: 0.95rem; font-weight: 700; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-play:hover { background: var(--accent2); transform: translateY(-2px); }

  .btn-info {
    display: flex; align-items: center; gap: 0.6rem;
    background: rgba(255,255,255,0.12); color: #fff;
    border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
    padding: 0.75rem 1.6rem; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
  }
  .btn-info:hover { background: rgba(255,255,255,0.2); }

  /* HERO DOTS */
  .hero-dots {
    position: absolute; bottom: 1.5rem; right: 2rem;
    display: flex; gap: 0.5rem; z-index: 3;
  }
  .dot {
    width: 28px; height: 4px; border-radius: 2px; cursor: pointer;
    background: rgba(255,255,255,0.25); transition: background 0.3s, width 0.3s;
  }
  .dot.active { background: var(--accent); width: 48px; }

  /* SECTION */
  .section { padding: 2.5rem 3rem; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .section-title {
    font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
    letter-spacing: 1px; color: var(--text);
  }
  .section-title span { color: var(--accent); }
  .see-all {
    font-size: 0.8rem; color: var(--muted); text-decoration: none;
    font-weight: 500; cursor: pointer; transition: color 0.2s;
  }
  .see-all:hover { color: var(--accent); }

  /* CARDS GRID */
  .cards-row {
    display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }
  .cards-row::-webkit-scrollbar { display: none; }

  .anime-card {
    flex: 0 0 170px; scroll-snap-align: start;
    cursor: pointer; position: relative; border-radius: 10px; overflow: hidden;
    background: var(--bg2); border: 1px solid var(--border);
    transition: transform 0.25s, border-color 0.25s;
  }
  .anime-card:hover { transform: translateY(-6px) scale(1.02); border-color: var(--accent); }

  .anime-card img {
    width: 100%; height: 240px; object-fit: cover; display: block;
  }

  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,10,15,0.95) 30%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .anime-card:hover .card-overlay { opacity: 1; }

  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
  }
  .anime-card:hover .play-btn { opacity: 1; transform: translate(-50%, -50%); }

  .card-info {
    padding: 0.75rem; background: var(--bg2);
  }
  .card-title {
    font-size: 0.82rem; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 0.25rem;
  }
  .card-sub {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.72rem; color: var(--muted);
  }
  .card-rating { color: var(--gold); font-weight: 600; }

  .card-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--accent); color: #fff;
    font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase;
  }
  .card-badge.new { background: #06d6a0; }
  .card-badge.ep { background: var(--bg3); border: 1px solid var(--border); }

  /* GENRES */
  .genres-row {
    display: flex; gap: 0.75rem; flex-wrap: wrap; padding-bottom: 0.5rem;
  }
  .genre-chip {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--muted); padding: 0.4rem 1.1rem; border-radius: 999px;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .genre-chip:hover, .genre-chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  /* TOP SECTION */
  .top-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;
  }
  @media (max-width: 768px) { .top-grid { grid-template-columns: 1fr; } }

  .top-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .top-item {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.75rem; background: var(--bg2); border-radius: 10px;
    border: 1px solid var(--border); cursor: pointer;
    transition: border-color 0.2s, background 0.2s;

  .top-item:hover { border-color: var(--accent); background: var(--card-hover); }

  .top-rank {
    font-family: 'Bebas Neue', cursive; font-size: 1.8rem;
    color: var(--border); min-width: 36px; text-align: center; line-height: 1;
  }
  .top-item:nth-child(1) .top-rank { color: var(--gold); }
  .top-item:nth-child(2) .top-rank { color: #c0c0c0; }
  .top-item:nth-child(3) .top-rank { color: #cd7f32; }

  .top-thumb {
    width: 52px; height: 72px; object-fit: cover; border-radius: 6px; flex-shrink: 0;
  }

  .top-details { flex: 1; min-width: 0; }
  .top-title {
    font-size: 0.87rem; font-weight: 600; white-space: nowrap;

  }
  .top-meta { font-size: 0.75rem; color: var(--muted); }

  .player-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
    flex-direction: column;
  }
  .player-modal.open { display: flex; }

  .player-container {
    width: 90vw; max-width: 1000px; position: relative;
  }

  .player-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .player-title { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--text); }
  .close-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
    font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;

  .close-btn:hover { color: var(--accent); border-color: var(--accent); }

  .video-wrapper {
    position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden;
    background: #000; border: 1px solid var(--border);
  }
  .video-wrapper iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }

  .ep-picker {
    display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
  }
  .ep-btn {
    background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
    padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; font-family: 'DM Sans', sans-serif; transition: all 0.2s;

  .ep-btn:hover, .ep-btn.active {

    margin-top: 3rem; padding: 2rem 3rem; background: var(--bg2);

    font-size: 0.82rem; color: var(--muted);
  }

    border-top: 8px solid transparent; border-bottom: 8px solid transparent;

</style>

    const a = ANIME_DB[idx];
    return `<div class="hero-slide ${i===0?'active':''}" id="slide${i}">
      <img src="${a.hero||a.thumb}" alt="${a.title}" onerror="this.src='${a.thumb}'">
      <div class="hero-gradient"></div>
    </div>`;
  }).join('');

  dots.innerHTML = HEROES.map((_,i) =>
    `<div class="dot ${i===0?'active':''}" onclick="setHero(${i})"></div>`
  ).join('');

  renderHeroContent(0);
  startHeroTimer();
}

function renderHeroContent(i) {
  const a = ANIME_DB[HEROES[i]];
  const content = document.getElementById('heroContent');
  content.innerHTML = `
    <div class="hero-badge">▶ Trending #${i+1}</div>
    <h1 class="hero-title">${a.title}</h1>
    <div class="hero-meta">
      <span class="hero-rating">★ ${a.rating}</span>
      <span>${a.year}</span>
      <span>${a.episodes} Episode</span>
      <span>${a.genre.join(' · ')}</span>
    </div>
    <p class="hero-desc">${a.desc}</p>
    <div class="hero-buttons">
      <button class="btn-play" onclick="openPlayer(${a.id})">
        <span class="icon-play"></span> Tonton Sekarang
      </button>
      <button class="btn-info" onclick="showInfo(${a.id})">ℹ Info</button>
    </div>`;
}

function setHero(i) {
  document.querySelectorAll('.hero-slide').forEach((s,j) => s.classList.toggle('active', j===i));
  document.querySelectorAll('.dot').forEach((d,j) => d.classList.toggle('active', j===i));
  currentHero = i;
  renderHeroContent(i);
}

function startHeroTimer() {
  heroTimer = setInterval(() => {
    const next = (currentHero + 1) % HEROES.length;
    setHero(next);
  }, 5000);
}

// GENRES
function buildGenres() {
  const row = document.getElementById('genresRow');
  row.innerHTML = GENRES.map((g, i) =>
    `<div class="genre-chip ${i===0?'active':''}" onclick="filterGenre('${g}', this)">${g}</div>`
  ).join('');
}

function filterGenre(genre, el) {
  document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const filtered = genre === 'Semua' ? ANIME_DB : ANIME_DB.filter(a => a.genre.includes(genre));
  renderCards('latestRow', filtered, 'new');
  renderCards('popularRow', filtered.slice().sort((a,b)=>b.rating-a.rating), 'ep');
}

// CARDS
function renderCards(containerId, list, badgeType) {
  const row = document.getElementById(containerId);
  row.innerHTML = list.slice(0,10).map(a => `
    <div class="anime-card" onclick="openPlayer(${a.id})">
      <img src="${a.thumb}" alt="${a.title}" loading="lazy" onerror="this.style.background='#1a1a2e'">
      <div class="card-overlay"></div>
      <div class="play-btn"><span class="icon-play" style="border-left-color:#fff"></span></div>
      <div class="card-badge ${badgeType}">${badgeType === 'new' ? 'BARU' : 'EP '+a.episodes}</div>
      <div class="card-info">
        <div class="card-title">${a.title}</div>
        <div class="card-sub">
          <span>${a.genre[0]}</span>
          <span class="card-rating">★ ${a.rating}</span>
        </div>
      </div>
    </div>`).join('');
}

// TOP LISTS
function buildTopLists() {
  const topRating = ANIME_DB.slice().sort((a,b) => b.rating - a.rating).slice(0,5);
  const topOngoing = ANIME_DB.filter(a => a.status === 'Ongoing').slice(0,5);

  const renderList = (id, list) => {
    document.getElementById(id).innerHTML = list.map((a,i) => `
      <div class="top-item" onclick="openPlayer(${a.id})">
        <div class="top-rank">${String(i+1).padStart(2,'0')}</div>
        <img class="top-thumb" src="${a.thumb}" alt="${a.title}" loading="lazy">
        <div class="top-details">
          <div class="top-title">${a.title}</div>
          <div class="top-meta">★ ${a.rating} · ${a.genre[0]} · ${a.episodes} eps</div>
        </div>
      </div>`).join('');
  };

  renderList('topRating', topRating);
  renderList('topOngoing', topOngoing);
}

// PLAYER
function openPlayer(id) {
  const anime = ANIME_DB.find(a => a.id === id);
  if (!anime) return;
  clearInterval(heroTimer);

  document.getElementById('playerTitle').textContent = anime.title + ' – Episode 1';
  document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${anime.youtubeId}?autoplay=1&rel=0`;

  const eps = Math.min(anime.episodes, 24);
  const picker = document.getElementById('epPicker');
  picker.innerHTML = '';
  for (let i=1; i<=eps; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i===1?' active':'');
    btn.textContent = `EP ${i}`;
    btn.onclick = (function(ep, anime2) {
      return function() {
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('playerTitle').textContent = anime2.title + ' – Episode ' + ep;
        document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${anime2.youtubeId}?autoplay=1&rel=0&t=${ep*60}`;
      };
    })(i, anime);
    picker.appendChild(btn);
  }

  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('videoFrame').src = '';
  document.body.style.overflow = '';
  startHeroTimer();
}

function showInfo(id) {
  const a = ANIME_DB.find(x => x.id === id);
  if (!a) return;
  alert(`📺 ${a.title}\n\n${a.desc}\n\n• Rating: ${a.rating}/10\n• Tahun: ${a.year}\n• Episode: ${a.episodes}\n• Status: ${a.status}\n• Genre: ${a.genre.join(', ')}`);
}

function goHome() {
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// SEARCH
function handleSearch(q) {
  clearTimeout(searchTimeout);
  if (!q.trim()) {
    renderCards('latestRow', ANIME_DB, 'new');
    renderCards('popularRow', ANIME_DB.slice().sort((a,b)=>b.rating-a.rating), 'ep');
    return;
  }
  searchTimeout = setTimeout(() => {
    const lower = q.toLowerCase();
    const results = ANIME_DB.filter(a =>
      a.title.toLowerCase().includes(lower) || a.subtitle.toLowerCase().includes(lower) ||
      a.genre.some(g => g.toLowerCase().includes(lower))
    );
    renderCards('latestRow', results, 'new');
    renderCards('popularRow', results, 'ep');
    window.scrollTo({top: 300, behavior: 'smooth'});
  }, 350);
}

// Close modal on outside click
document.getElementById('playerModal').addEventListener('click', function(e) {
  if (e.target === this) closePlayer();
});

// ESC to close
document.addEventListener('keydown', e => { if (e.key==='Escape') closePlayer(); });

// INIT
buildHero();
buildGenres();
renderCards('latestRow', ANIME_DB, 'new');
renderCards('popularRow', ANIME_DB.slice().sort((a,b)=>b.rating-a.rating), 'ep');
buildTopLists();
</script>
</body>
</html>
